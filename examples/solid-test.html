<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solid Test</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111827;
      color: #f9fafb;
      font-family: sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    .panel {
      text-align: center;
    }

    .eyebrow {
      font-size: 18px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #93c5fd;
    }

    .headline {
      font-size: 72px;
      font-weight: 800;
      margin: 16px 0;
    }

    .body {
      font-size: 28px;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="eyebrow">Walla Page</div>
    <div class="headline">Display Test</div>
    <div class="body">If you can read this, the wall renderer works.</div>
  </div>
</body>
</html>
