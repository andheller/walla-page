<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walla Nebula - 2049 Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;900&display=swap');
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: saturate(1.4) contrast(1.1);
        }
        .clock {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Inter', sans-serif;
            font-size: clamp(100px, 18vw, 240px);
            font-weight: 100;
            color: #fff;
            letter-spacing: -0.05em;
            pointer-events: none;
            /* Neon glow matching the aesthetic */
            text-shadow: 
                0 0 20px rgba(255, 0, 150, 0.5),
                0 0 40px rgba(0, 200, 255, 0.3);
            opacity: 0.9;
            z-index: 10;
        }
        /* Subtle scanline overlay for that hologram feel */
        .overlay {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.05) 0px,
                rgba(0, 0, 0, 0.05) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>

<div class="overlay"></div>
<div class="clock" id="clock">00:00</div>
<canvas id="nebula"></canvas>

<script>
    const canvas = document.getElementById('nebula');
    const gl = canvas.getContext('webgl');

    const vsSource = `
        attribute vec4 aVertexPosition;
        void main() {
            gl_Position = aVertexPosition;
        }
    `;

    const fsSource = `
        precision highp float;
        uniform float uTime;
        uniform vec2 uResolution;

        float hash(vec2 p) {
            return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            return mix(mix(hash(i + vec2(0.0, 0.0)), hash(i + vec2(1.0, 0.0)), f.x),
                       mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x), f.y);
        }

        float fbm(vec2 p) {
            float v = 0.0;
            float a = 0.5;
            for (int i = 0; i < 6; i++) {
                v += a * noise(p);
                p *= 2.1;
                a *= 0.5;
            }
            return v;
        }

        void main() {
            vec2 uv = gl_FragCoord.xy / uResolution.xy;
            float time = uTime * 0.3;
            
            vec2 p = uv * 2.0 - 1.0;
            p.x *= uResolution.x / uResolution.y;

            // Large, sweeping movement inspired by the scale of 2049
            float n1 = fbm(p * 0.5 + time * 0.05);
            float n2 = fbm(p * 0.8 - time * 0.1 + n1);
            
            // Cyberpunk 2049 Palette: Cyan & Magenta
            vec3 cyan = vec3(0.0, 0.8, 1.0);
            vec3 magenta = vec3(1.0, 0.0, 0.6);
            vec3 deepBlue = vec3(0.02, 0.01, 0.1);
            
            // Background haze
            vec3 color = mix(deepBlue, cyan * 0.4, n1);
            color = mix(color, magenta * 0.5, n2);
            
            // Bright "Joi" highlights
            float highlight = pow(fbm(p * 1.5 + n2), 3.0);
            color += cyan * highlight * 1.8;
            
            float core = pow(fbm(p * 2.0 - time * 0.2), 4.0);
            color += magenta * core * 2.5;

            // Brighter overall atmosphere
            color *= 1.4;

            // Vignette for depth
            float vignette = 1.0 - length(p * 0.4);
            color *= vignette;

            // Dynamic flicker
            float flicker = 0.98 + 0.02 * sin(uTime * 50.0);
            gl_FragColor = vec4(color * flicker, 1.0);
        }
    `;

    function createShader(gl, type, source) {
        const shader = gl.createShader(type);
        gl.shaderSource(shader, source);
        gl.compileShader(shader);
        return shader;
    }

    const program = gl.createProgram();
    gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
    gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
    gl.linkProgram(program);

    const positionBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,1,1,1,-1,-1,1,-1]), gl.STATIC_DRAW);

    const posAttrib = gl.getAttribLocation(program, 'aVertexPosition');
    const uTime = gl.getUniformLocation(program, 'uTime');
    const uRes = gl.getUniformLocation(program, 'uResolution');

    function render(time) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
        gl.useProgram(program);
        gl.enableVertexAttribArray(posAttrib);
        gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
        gl.vertexAttribPointer(posAttrib, 2, gl.FLOAT, false, 0, 0);
        gl.uniform1f(uTime, time * 0.001);
        gl.uniform2f(uRes, canvas.width, canvas.height);
        gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
        
        const now = new Date();
        document.getElementById('clock').textContent = 
            now.getHours().toString().padStart(2, '0') + ':' + 
            now.getMinutes().toString().padStart(2, '0');
            
        requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
</script>
</body>
</html>
