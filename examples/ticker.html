<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walla Ticker - Ambient Stream</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'JetBrains Mono', monospace;
        }

        .ticker-container {
            width: 100%;
            background: #050505;
            padding: 20px 0;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        .ticker {
            display: inline-block;
            padding-left: 100%;
            animation: ticker-scroll 30s linear infinite;
        }

        .item {
            display: inline-block;
            padding: 0 40px;
            font-size: 32px;
            color: #4cd964; /* Market Green */
            text-shadow: 0 0 10px rgba(76, 217, 100, 0.4);
        }

        .item.down {
            color: #ff3b30;
            text-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
        }

        .item .label {
            color: #666;
            font-size: 16px;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes ticker-scroll {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Glass / Scanning effect overlay */
        .glass {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(255,255,255,0.02), transparent);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="ticker-container">
    <div class="glass"></div>
    <div class="ticker-wrap">
        <div class="ticker" id="ticker">
            <!-- Content -->
        </div>
    </div>
</div>

<script>
    const ITEMS = [
        { label: "DEPLOY", val: "+24%", trend: "up" },
        { label: "LOAD", val: "0.12", trend: "up" },
        { label: "UPTIME", val: "99.9%", trend: "up" },
        { label: "ERRORS", val: "0", trend: "up" },
        { label: "MEMORY", val: "1.2GB", trend: "down" },
        { label: "REQUESTS", val: "14.2k", trend: "up" },
        { label: "TEMP", val: "42°C", trend: "up" }
    ];

    function render() {
        const ticker = document.getElementById('ticker');
        // Duplicate items for seamless loop
        const content = [...ITEMS, ...ITEMS, ...ITEMS].map(item => `
            <div class="item ${item.trend}">
                <span class="label">${item.label}</span>
                <span>${item.trend === 'up' ? '▲' : '▼'} ${item.val}</span>
            </div>
        `).join('');
        ticker.innerHTML = content;
    }

    render();
</script>
</body>
</html>
