<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walla Mosaic - Premium Ambient</title>
    <style>
        :root {
            --bg: #050505;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Subtle vignette */
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
        }
        
        .mosaic-container {
            position: relative;
            padding: 20px;
            background: #000;
            border-radius: 8px;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.9),
                inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        #mosaic {
            display: grid;
            gap: 3px;
            perspective: 1000px;
        }

        .tile {
            width: 14px;
            height: 14px;
            background: #111;
            border-radius: 2px;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s ease;
            position: relative;
        }

        /* Premium glass reflection on tiles */
        .tile::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            border-radius: inherit;
        }

        .tile.active {
            transform: scale(1.1) translateZ(10px);
            z-index: 2;
        }
    </style>
</head>
<body>

<div class="mosaic-container">
    <div id="mosaic"></div>
</div>

<script>
    const ROWS = 28;
    const COLS = 56;
    const mosaic = document.getElementById('mosaic');
    const tiles = [];

    mosaic.style.gridTemplateColumns = `repeat(${COLS}, 1fr)`;

    // Refined "2049" adjacent palette
    const colors = [
        '#00d2ff', // Cyan
        '#ff007f', // Magenta
        '#7a00ff', // Purple
        '#00ff9f', // Seafoam
        '#3a0ca3', // Deep Blue
        '#f72585'  // Hot Pink
    ];

    for (let i = 0; i < ROWS * COLS; i++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        mosaic.appendChild(tile);
        tiles.push(tile);
    }

    function update() {
        const time = Date.now() * 0.0008;
        
        tiles.forEach((tile, i) => {
            const r = Math.floor(i / COLS);
            const c = i % COLS;
            
            // Complex interference patterns
            const n1 = Math.sin(c * 0.08 + time);
            const n2 = Math.cos(r * 0.1 - time * 0.7);
            const n3 = Math.sin((c + r) * 0.05 + time * 0.3);
            
            const val = n1 * n2 + n3;
            
            if (val > 0.9) {
                const colorIdx = Math.floor((n1 + 1) * 3) % colors.length;
                tile.style.background = colors[colorIdx];
                tile.style.boxShadow = `0 0 15px ${colors[colorIdx]}66`;
                tile.classList.add('active');
            } else if (val > 0.5) {
                tile.style.background = '#222';
                tile.style.boxShadow = 'none';
                tile.classList.remove('active');
            } else {
                tile.style.background = '#0a0a0a';
                tile.style.boxShadow = 'none';
                tile.classList.remove('active');
            }
        });
        
        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
