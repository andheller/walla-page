<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walla Transit - Workflow Progress</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;700&display=swap');
        
        body {
            margin: 0;
            background: #0d0e12;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .map-container {
            width: min(90vw, 1000px);
            position: relative;
            padding: 100px 40px;
        }

        /* The "Track" */
        .track {
            position: absolute;
            top: 50%;
            left: 50px;
            right: 50px;
            height: 12px;
            background: #1a1b26;
            transform: translateY(-50%);
            border-radius: 999px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        /* The Progress Glow */
        .progress {
            position: absolute;
            top: 50%;
            left: 50px;
            height: 12px;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            transform: translateY(-50%);
            border-radius: 999px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
            z-index: 1;
        }

        .stops {
            display: flex;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .stop {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dot {
            width: 24px;
            height: 24px;
            background: #1a1b26;
            border: 4px solid #30363d;
            border-radius: 50%;
            transition: all 0.5s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .stop.active .dot {
            background: #60a5fa;
            border-color: #fff;
            box-shadow: 0 0 20px #60a5fa;
            transform: scale(1.4);
        }

        .stop.completed .dot {
            background: #3b82f6;
            border-color: #3b82f6;
        }

        .label {
            margin-top: 20px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #4a4a4f;
            transition: color 0.5s ease;
        }

        .stop.active .label {
            color: #fff;
        }

        .stop.completed .label {
            color: #3b82f6;
        }

        /* Status bubble */
        .status-bubble {
            position: absolute;
            top: -60px;
            background: #fff;
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            white-space: nowrap;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }

        .stop.active .status-bubble {
            opacity: 1;
            transform: translateY(0);
        }

        .status-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #fff;
        }
    </style>
</head>
<body>

<div class="map-container">
    <div class="track"></div>
    <div class="progress" id="progress-bar"></div>
    <div class="stops" id="stops">
        <!-- Stops generated by JS -->
    </div>
</div>

<script>
    const STEPS = [
        { name: "Idea", status: "Complete" },
        { name: "Draft", status: "In Progress" },
        { name: "Review", status: "Waiting" },
        { name: "Deploy", status: "Queued" },
        { name: "Live", status: "Ready" }
    ];

    let currentStepIdx = 1;

    function render() {
        const stopsEl = document.getElementById('stops');
        const progressEl = document.getElementById('progress-bar');
        
        stopsEl.innerHTML = STEPS.map((step, idx) => `
            <div class="stop ${idx < currentStepIdx ? 'completed' : ''} ${idx === currentStepIdx ? 'active' : ''}">
                <div class="status-bubble">${step.status.toUpperCase()}</div>
                <div class="dot"></div>
                <div class="label">${step.name}</div>
            </div>
        `).join('');

        const progressPercent = (currentStepIdx / (STEPS.length - 1)) * 100;
        progressEl.style.width = `calc(${progressPercent}% - 50px)`;
    }

    // Auto-advance for demo
    setInterval(() => {
        currentStepIdx = (currentStepIdx + 1) % STEPS.length;
        render();
    }, 5000);

    render();
</script>
</body>
</html>
