<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Board - Walla Ambient</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        :root {
            --bg: #0a0a0b;
            --panel: #161618;
            --accent: #f47a18;
            --text: #e2e2e4;
            --dim: #4a4a4f;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .board {
            width: min(90vw, 1200px);
            background: var(--panel);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid #000;
        }

        .header {
            display: grid;
            grid-template-columns: 120px 1fr 200px;
            gap: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--dim);
            color: var(--dim);
            font-weight: 900;
            font-size: 14px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .rows {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row {
            display: grid;
            grid-template-columns: 120px 1fr 200px;
            gap: 20px;
            font-size: 32px;
            font-weight: 700;
            align-items: center;
            animation: row-jitter 0.2s ease-out;
        }

        .time { color: var(--accent); font-family: monospace; }
        .destination { letter-spacing: 0.05em; }
        .status {
            font-size: 18px;
            padding: 6px 12px;
            background: #000;
            border-radius: 4px;
            text-align: center;
            border: 1px solid var(--dim);
            color: var(--dim);
            text-transform: uppercase;
        }

        .status.boarding { color: #4cd964; border-color: #4cd964; box-shadow: 0 0 10px rgba(76, 217, 100, 0.2); }
        .status.delayed { color: #ff3b30; border-color: #ff3b30; }
        .status.on-time { color: var(--accent); border-color: var(--accent); }

        @keyframes row-jitter {
            0% { transform: translateY(5px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            color: var(--dim);
            font-size: 12px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="board">
    <div class="header">
        <div>Time</div>
        <div>Activity</div>
        <div>Status</div>
    </div>
    <div class="rows" id="rows">
        <!-- JS generated -->
    </div>
    <div class="footer">
        <div>Station: Home_01</div>
        <div>Platform: Walla_Ambient</div>
    </div>
</div>

<script>
    const ACTIVITIES = [
        { time: "09:00", name: "DEEP WORK", status: "ON TIME" },
        { time: "12:30", name: "LUNCH BREAK", status: "BOARDING" },
        { time: "15:00", name: "BUILD / DEPLOY", status: "DELAYED" },
        { time: "18:00", name: "DOG WALK", status: "NOW ARRIVING" },
        { time: "19:30", name: "DINNER", status: "SCHEDULED" }
    ];

    function render() {
        const rowsEl = document.getElementById('rows');
        rowsEl.innerHTML = '';
        
        ACTIVITIES.forEach(act => {
            const row = document.createElement('div');
            row.className = 'row';
            
            let statusClass = act.status.toLowerCase().replace(' ', '-');
            if (act.status === "BOARDING" || act.status === "NOW ARRIVING") statusClass = "boarding";
            
            row.innerHTML = `
                <div class="time">${act.time}</div>
                <div class="destination">${act.name}</div>
                <div class="status ${statusClass}">${act.status}</div>
            `;
            rowsEl.appendChild(row);
        });
    }

    // Every few seconds, simulate a status change
    setInterval(() => {
        const idx = Math.floor(Math.random() * ACTIVITIES.length);
        const randomStatuses = ["ON TIME", "DELAYED", "BOARDING", "NOW ARRIVING", "SCHEDULED"];
        ACTIVITIES[idx].status = randomStatuses[Math.floor(Math.random() * randomStatuses.length)];
        render();
    }, 5000);

    render();
</script>
</body>
</html>
